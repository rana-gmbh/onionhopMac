name: Build, Sign & Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.4.3)'
        required: false

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'
  APP_NAME: OnionHop
  BUNDLE_ID: com.onionhop.v3
  PUBLISH_DIR: publish/OnionHop.app
  APP_PROJECT: OnionHop/src/OnionHopV3.App
  EXE_NAME: OnionHopV3
  # Minimum supported macOS. .NET 9 runs on Ventura, so target 13.0 to cover "legacy" Macs that
  # can't move past Ventura (issue #62). Drives the deployment target, SupportedOSPlatformVersion,
  # the universal Swift helper target, and LSMinimumSystemVersion (the gate macOS enforces).
  MIN_MACOS_VERSION: '13.0'

jobs:
  build-sign-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go (pluggable transports)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build macOS pluggable transports (webtunnel, dnstt)
        run: |
          set -euo pipefail
          # The macOS Tor bundle ships lyrebird (obfs4/meek/snowflake) and conjure-client, but not
          # the webtunnel or dnstt clients - those are standalone Go programs. Build them as universal
          # (arm64 + x86_64) binaries and stage them in pluggable_transports so the dotnet publish glob
          # copies them into the .app. Without webtunnel-client, webtunnel bridges fail at connect with
          # "Webtunnel client is missing".
          PT="OnionHop/tor/pluggable_transports"
          mkdir -p "$PT"

          build_universal() {
            name="$1"; srcdir="$2"; pkg="$3"
            ( cd "$srcdir" && CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o "/tmp/${name}-arm64" "$pkg" )
            ( cd "$srcdir" && CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "/tmp/${name}-amd64" "$pkg" )
            lipo -create "/tmp/${name}-arm64" "/tmp/${name}-amd64" -output "$PT/${name}"
            chmod +x "$PT/${name}"
            file "$PT/${name}"
            lipo -archs "$PT/${name}"
          }

          # webtunnel-client (v0.0.3, matching download-deps)
          curl -fsSL "https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/webtunnel/-/archive/v0.0.3/webtunnel-v0.0.3.tar.gz" -o /tmp/webtunnel.tar.gz
          mkdir -p /tmp/webtunnel
          tar -xzf /tmp/webtunnel.tar.gz -C /tmp/webtunnel --strip-components=1
          build_universal "webtunnel-client" "/tmp/webtunnel" "./main/client"

          # dnstt-client (bamsoftware; full clone - its dumb-HTTP server rejects shallow fetches)
          git clone https://www.bamsoftware.com/git/dnstt.git /tmp/dnstt
          build_universal "dnstt-client" "/tmp/dnstt/dnstt-client" "."

      - name: Publish for macOS (arm64)
        run: |
          export MACOSX_DEPLOYMENT_TARGET="${{ env.MIN_MACOS_VERSION }}"
          dotnet publish ${{ env.APP_PROJECT }} \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:SupportedOSPlatformVersion=${{ env.MIN_MACOS_VERSION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -o build/arm64

      - name: Publish for macOS (x64)
        run: |
          export MACOSX_DEPLOYMENT_TARGET="${{ env.MIN_MACOS_VERSION }}"
          dotnet publish ${{ env.APP_PROJECT }} \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=false \
            -p:SupportedOSPlatformVersion=${{ env.MIN_MACOS_VERSION }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -o build/x64

      # NOTE: there is deliberately no "universal" merge step. .NET self-contained publishes ship
      # per-architecture managed assemblies (System.Private.CoreLib.dll is ReadyToRun/native-compiled
      # for one arch), and those cannot be lipo'd. The old merge kept only the arm64 copies, so Intel
      # Macs crashed at launch with 0x8007000B. Instead we build one DMG per architecture below, each
      # using its own build/<arch> output. The shared native binaries (tor, lyrebird, conjure,
      # sing-box, webtunnel/dnstt, the Swift helper) are universal, so they work in both DMGs.

      - name: Build macOS Swift helper (universal)
        env:
          MIN_MACOS_VERSION: ${{ env.MIN_MACOS_VERSION }}
        run: |
          # The Swift helper (onionhop-mac-helper) performs OnionHop's elevated macOS operations:
          # system proxy, /etc/resolver/onion DNS, pf kill switch, and NetworkExtension tunnel
          # control. The app finds it under macos/OnionHopMacHelper/ next to the executable, so it
          # must ship inside the bundle for TUN/VPN mode to work without manual setup.
          chmod +x macos/OnionHopMacHelper/build.sh
          ./macos/OnionHopMacHelper/build.sh
          file macos/OnionHopMacHelper/onionhop-mac-helper

      - name: Fetch macOS sing-box (universal)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # sing-box is the TUN core for the osascript (admin-prompt) tunnel path. SagerNet publishes
          # separate darwin-amd64 and darwin-arm64 builds (no universal asset), so fetch both and lipo
          # them into a universal binary at vpn/sing-box (where the app looks).
          mkdir -p build/macos-vpn /tmp/sb-amd64 /tmp/sb-arm64

          AMD64_URL=$(gh api repos/SagerNet/sing-box/releases/latest \
            --jq '.assets[] | select(.name | test("darwin-amd64\\.tar\\.gz$")) | .browser_download_url')
          ARM64_URL=$(gh api repos/SagerNet/sing-box/releases/latest \
            --jq '.assets[] | select(.name | test("darwin-arm64\\.tar\\.gz$")) | .browser_download_url')
          echo "amd64: $AMD64_URL"
          echo "arm64: $ARM64_URL"
          if [ -z "$AMD64_URL" ] || [ -z "$ARM64_URL" ]; then
            echo "::error::Could not resolve sing-box darwin asset URLs"; exit 1
          fi

          curl -fsSL "$AMD64_URL" -o /tmp/sb-amd64.tar.gz
          curl -fsSL "$ARM64_URL" -o /tmp/sb-arm64.tar.gz
          tar -xzf /tmp/sb-amd64.tar.gz -C /tmp/sb-amd64
          tar -xzf /tmp/sb-arm64.tar.gz -C /tmp/sb-arm64

          SB_AMD64=$(find /tmp/sb-amd64 -type f -name sing-box | head -1)
          SB_ARM64=$(find /tmp/sb-arm64 -type f -name sing-box | head -1)
          if [ -z "$SB_AMD64" ] || [ -z "$SB_ARM64" ]; then
            echo "::error::sing-box binary not found in archives"; exit 1
          fi

          lipo -create "$SB_AMD64" "$SB_ARM64" -output build/macos-vpn/sing-box
          chmod +x build/macos-vpn/sing-box
          file build/macos-vpn/sing-box
          lipo -archs build/macos-vpn/sing-box

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add keychain to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Allow codesign to access the key without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Clean up
          rm /tmp/certificate.p12

      - name: Build, sign & notarize per-architecture DMGs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          IDENTITY="Developer ID Application: Rana GmbH (${{ secrets.APPLE_TEAM_ID }})"
          mkdir -p dist

          # Shared, hardened-runtime entitlements applied to every signed Mach-O binary.
          ENTITLEMENTS_FILE="$(mktemp)"
          cat > "$ENTITLEMENTS_FILE" << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.network.server</key>
            <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          # Info.plist is identical for both architectures (same version + bundle id), so build it once.
          PLIST_FILE="$(mktemp)"
          cat > "$PLIST_FILE" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleDisplayName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>${{ env.BUNDLE_ID }}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>OnionHopV3</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>${{ env.MIN_MACOS_VERSION }}</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.utilities</string>
          </dict>
          </plist>
          PLIST

          # Build one signed + notarized DMG per architecture. Each bundle uses its own build/<arch>
          # publish output (correct managed assemblies + apphost + .NET dylibs for that CPU) plus the
          # shared universal native binaries (Swift helper, sing-box, tor stack).
          build_arch() {
            ARCH="$1"          # arm64 (Apple Silicon) | x64 (Intel)
            SRC="build/${ARCH}"
            STAGE="publish/${ARCH}"
            APP="${STAGE}/${{ env.APP_NAME }}.app"

            rm -rf "$STAGE"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

            # Architecture-specific .NET payload.
            cp -R "$SRC"/* "$APP/Contents/MacOS/"

            # Universal Swift helper (elevated macOS ops; required for TUN/VPN mode).
            mkdir -p "$APP/Contents/MacOS/macos/OnionHopMacHelper"
            cp macos/OnionHopMacHelper/onionhop-mac-helper "$APP/Contents/MacOS/macos/OnionHopMacHelper/onionhop-mac-helper"

            # Universal sing-box TUN core where the app looks: vpn/sing-box.
            mkdir -p "$APP/Contents/MacOS/vpn"
            cp build/macos-vpn/sing-box "$APP/Contents/MacOS/vpn/sing-box"

            chmod +x "$APP/Contents/MacOS/tor/tor" 2>/dev/null || true
            chmod +x "$APP/Contents/MacOS/tor/pluggable_transports/lyrebird" 2>/dev/null || true
            chmod +x "$APP/Contents/MacOS/tor/pluggable_transports/conjure-client" 2>/dev/null || true
            chmod +x "$APP/Contents/MacOS/macos/OnionHopMacHelper/onionhop-mac-helper" 2>/dev/null || true
            chmod +x "$APP/Contents/MacOS/vpn/sing-box" 2>/dev/null || true

            if [ -f ${{ env.APP_PROJECT }}/Assets/logo.png ]; then
              cp ${{ env.APP_PROJECT }}/Assets/logo.png "$APP/Contents/Resources/AppIcon.png"
            fi
            cp "$PLIST_FILE" "$APP/Contents/Info.plist"

            # Sign dylibs/.so first, then native executables (Mach-O only, skip managed .dll), then the bundle.
            find "$APP/Contents/MacOS" -type f \( -name "*.dylib" -o -name "*.so" \) | while read -r binary; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary" 2>/dev/null || true
            done
            find "$APP/Contents/MacOS" -type f -perm +111 ! -name "*.dll" ! -name "*.json" ! -name "*.txt" ! -name "*.xml" ! -name "*.pdb" ! -name "*.config" | while read -r binary; do
              if file "$binary" | grep -q "Mach-O"; then
                codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS_FILE" --sign "$IDENTITY" "$binary" 2>/dev/null || true
              fi
            done
            codesign --force --deep --options runtime --timestamp --entitlements "$ENTITLEMENTS_FILE" --sign "$IDENTITY" "$APP"
            codesign --verify --deep --verbose=2 "$APP"

            # DMG with drag-to-Applications shortcut, signed + notarized + stapled.
            ln -s /Applications "$STAGE/Applications"
            DMG_NAME="${{ env.APP_NAME }}-${VERSION}-macOS-${ARCH}.dmg"
            hdiutil create -volname "${{ env.APP_NAME }}" -srcfolder "$STAGE" -ov -format UDZO "dist/${DMG_NAME}"
            codesign --force --timestamp --sign "$IDENTITY" "dist/${DMG_NAME}"
            xcrun notarytool submit "dist/${DMG_NAME}" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m
            xcrun stapler staple "dist/${DMG_NAME}"
            xcrun stapler validate "dist/${DMG_NAME}"
            echo "Built and notarized dist/${DMG_NAME}"
          }

          build_arch arm64
          build_arch x64

          rm -f "$ENTITLEMENTS_FILE" "$PLIST_FILE"
          ls -lh dist

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload DMG artifacts
        # Best-effort run artifacts (handy for workflow_dispatch builds). Must not fail the job: the
        # actual release attaches the DMGs directly from disk in the next step. If the org's Actions
        # artifact-storage quota is hit, skip this and still publish the release.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: OnionHop-macOS-dmgs
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        # Only publish a Release on a real tag push (v*). A manual workflow_dispatch run
        # builds + signs + notarizes and uploads the DMG as a run artifact only - no release.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # On a tag push use the tag; on workflow_dispatch (ref is a branch) use the version input,
          # so a manual run publishes vX.Y.Z rather than a release tagged with the branch name.
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: OnionHop ${{ steps.version.outputs.version }}
          body: |
            ## OnionHop ${{ steps.version.outputs.version }} for macOS

            ### Which download do I need?
            - **Apple Silicon (M1/M2/M3/M4):** `OnionHop-${{ steps.version.outputs.version }}-macOS-arm64.dmg`
            - **Intel:** `OnionHop-${{ steps.version.outputs.version }}-macOS-x64.dmg`

            Check Apple menu > About This Mac if you are unsure.

            ### Command line
            `OnionHopCLI-${{ steps.version.outputs.version }}-macos-arm64.tar.gz` / `…-macos-x64.tar.gz` — the terminal client, signed and notarized. Extract and run `./OnionHopV3.Cli`.

            ### Installation
            1. Download the `.dmg` for your chip
            2. Open the DMG and drag OnionHop into the Applications folder
            3. Launch OnionHop from Applications

            ### What's included
            - Tor with pluggable transports (obfs4, snowflake, conjure, webtunnel)
            - Proxy mode and TUN/VPN mode support
            - GeoIP database for country-specific exit nodes
            - Separate Apple Silicon (arm64) and Intel (x64) builds, each native to its CPU
          files: dist/*.dmg
          draft: false
          prerelease: false
          make_latest: true

  # ---------------------------------------------------------------------------
  # macOS CLI: self-contained arm64 + x64 tarballs with the same universal native
  # runtime as the Linux CLI (tor, transports, sing-box, xray, ArtiHop, snowflake
  # proxy), built by download-deps-macos.sh. Every Mach-O binary is signed with the
  # Developer ID certificate (hardened runtime) and the payload is notarized, so
  # users do not have to strip the quarantine flag by hand. Runs in parallel with
  # the DMG job; both attach their files to the same tag's release.
  # ---------------------------------------------------------------------------
  build-sign-cli:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS native dependencies (universal)
        run: |
          chmod +x download-deps-macos.sh
          bash download-deps-macos.sh

      - name: Publish CLI (osx-arm64 + osx-x64, self-contained)
        run: |
          export MACOSX_DEPLOYMENT_TARGET="${{ env.MIN_MACOS_VERSION }}"
          for RID in osx-arm64 osx-x64; do
            dotnet publish OnionHop/src/OnionHopV3.Cli/OnionHopV3.Cli.csproj \
              -c Release -r "$RID" --self-contained true \
              /p:PublishSingleFile=false /p:PublishReadyToRun=false \
              -p:SupportedOSPlatformVersion=${{ env.MIN_MACOS_VERSION }} \
              -p:Version=${{ steps.version.outputs.version }} \
              -o "publish-cli-$RID"
          done

      - name: Strip Windows-only artifacts + set exec bits
        run: |
          for RID in osx-arm64 osx-x64; do
            DIR="publish-cli-$RID"
            find "$DIR" -type f -name '*.exe' -delete || true
            find "$DIR" -type f -name 'wintun.dll' -delete || true
            chmod +x "$DIR/OnionHopV3.Cli" || true
            for d in "$DIR/tor" "$DIR/tor/pluggable_transports" "$DIR/vpn" "$DIR/snowflake" "$DIR/artihop"; do
              [ -d "$d" ] && chmod +x "$d"/* 2>/dev/null || true
            done
          done

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/cli-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Sign, notarize & package tarballs
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          IDENTITY="Developer ID Application: Rana GmbH (${{ secrets.APPLE_TEAM_ID }})"
          mkdir -p dist

          # Same hardened-runtime entitlements the app bundle uses (the .NET runtime
          # needs JIT + unsigned executable memory).
          ENTITLEMENTS_FILE="$(mktemp)"
          cat > "$ENTITLEMENTS_FILE" << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
            <key>com.apple.security.cs.disable-library-validation</key>
            <true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key>
            <true/>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.network.server</key>
            <true/>
          </dict>
          </plist>
          ENTITLEMENTS

          for ARCH in arm64 x64; do
            DIR="publish-cli-osx-${ARCH}"

            # Sign dylibs first, then every Mach-O executable (skip managed .dll payloads).
            find "$DIR" -type f \( -name "*.dylib" -o -name "*.so" \) | while read -r binary; do
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary" 2>/dev/null || true
            done
            find "$DIR" -type f ! -name "*.dll" ! -name "*.json" ! -name "*.txt" ! -name "*.xml" ! -name "*.pdb" ! -name "*.config" ! -name "*.dylib" ! -name "*.so" | while read -r binary; do
              if file "$binary" | grep -q "Mach-O"; then
                codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS_FILE" --sign "$IDENTITY" "$binary"
              fi
            done

            # Notarize the signed payload (zip submission; Gatekeeper checks the
            # notarization record online, tarballs cannot be stapled).
            ditto -c -k --keepParent "$DIR" "dist/cli-${ARCH}-notarize.zip"
            xcrun notarytool submit "dist/cli-${ARCH}-notarize.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m
            rm "dist/cli-${ARCH}-notarize.zip"

            NAME="OnionHopCLI-${VERSION}-macos-${ARCH}.tar.gz"
            tar -C "$DIR" -czf "dist/$NAME" .
            shasum -a 256 "dist/$NAME" | tee "dist/${NAME}.sha256.txt"
          done

          rm -f "$ENTITLEMENTS_FILE"
          ls -lh dist

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/cli-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload CLI artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: OnionHopCLI-macos-signed
          path: |
            dist/OnionHopCLI-*-macos-*.tar.gz
            dist/OnionHopCLI-*-macos-*.tar.gz.sha256.txt
          if-no-files-found: error

      - name: Attach CLI to release
        # Files-only: the DMG job owns the release body/name; softprops merges
        # assets into the same tag's release regardless of which job finishes first.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          files: |
            dist/OnionHopCLI-*-macos-*.tar.gz
            dist/OnionHopCLI-*-macos-*.tar.gz.sha256.txt
          draft: false
          prerelease: false
